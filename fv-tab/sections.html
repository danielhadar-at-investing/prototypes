<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FV Tab Sections - C2/C3/C4</title>
<style>
  :root {
    --bg-screen: #1a1a2e;
    --card-bg: #16213e;
    --card-alt: #1b2a4a;
    --text-primary: #ffffff;
    --text-secondary: #8892a0;
    --text-tertiary: #5a6270;
    --green: #26a69a;
    --green-bg: rgba(38,166,154,0.12);
    --red: #ef5350;
    --red-bg: rgba(239,83,80,0.12);
    --blue: #2962ff;
    --blue-bg: rgba(41,98,255,0.12);
    --yellow: #ffab00;
    --yellow-bg: rgba(255,171,0,0.12);
    --border: rgba(255,255,255,0.06);
    --border-strong: rgba(255,255,255,0.10);
    --radius: 12px;
    --radius-sm: 8px;
    --font: -apple-system, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d1a;
    font-family: var(--font);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
    -webkit-font-smoothing: antialiased;
  }

  .page-header {
    text-align: center;
    margin-bottom: 24px;
    max-width: 600px;
  }
  .page-header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .page-header p {
    font-size: 13px;
    color: var(--text-tertiary);
    line-height: 1.5;
  }

  /* Concept switcher */
  .concept-switcher {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .concept-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    min-width: 150px;
  }
  .concept-btn:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.12);
  }
  .concept-btn.active {
    background: var(--blue-bg);
    border-color: var(--blue);
  }
  .concept-btn .letter {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    display: block;
    margin-bottom: 2px;
  }
  .concept-btn.active .letter { color: var(--blue); }
  .concept-btn .subtitle {
    font-size: 10px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
  }
  .concept-btn.active .subtitle { color: rgba(41,98,255,0.7); }

  .concept-label {
    font-size: 13px;
    color: var(--text-tertiary);
    margin-bottom: 16px;
    text-align: center;
    font-weight: 500;
    letter-spacing: 0.3px;
    height: 18px;
  }

  /* Phone frame */
  .phone-frame {
    width: 390px;
    height: 844px;
    background: var(--bg-screen);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.08),
      0 0 0 6px rgba(0,0,0,0.4),
      0 20px 60px rgba(0,0,0,0.5),
      0 0 120px rgba(41,98,255,0.04);
  }

  /* Status bar */
  .status-bar {
    height: 54px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 8px;
    background: var(--bg-screen);
    position: relative;
    z-index: 100;
    flex-shrink: 0;
  }
  .status-bar .time {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .status-bar .icons {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .status-bar .icons svg { width: 16px; height: 16px; fill: var(--text-primary); }

  /* Nav bar */
  .nav-bar {
    height: 44px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    background: var(--bg-screen);
    position: relative;
    z-index: 100;
    flex-shrink: 0;
  }
  .nav-back {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-back svg { width: 20px; height: 20px; fill: var(--blue); }
  .nav-title {
    flex: 1;
    text-align: center;
    margin-right: 28px;
  }
  .nav-title .ticker {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  .nav-title .name {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 1px;
  }

  /* Scrollable content area */
  .screen-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    position: relative;
    height: calc(844px - 54px - 44px - 34px);
  }
  .screen-content::-webkit-scrollbar { display: none; }

  .content-pad {
    padding: 0 16px 32px;
  }

  /* Home indicator */
  .home-indicator {
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-screen);
    flex-shrink: 0;
  }
  .home-indicator-bar {
    width: 134px;
    height: 5px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
  }

  /* ===== HERO SECTION (shared) ===== */
  .hero-row {
    display: flex;
    gap: 8px;
    margin-bottom: 0;
  }
  .hero-card {
    flex: 1;
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 16px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: border-color 0.3s ease, background 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .hero-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .hero-card-fv::before {
    background: linear-gradient(135deg, rgba(41,98,255,0.06) 0%, transparent 60%);
  }
  .hero-card-health::before {
    background: linear-gradient(135deg, rgba(38,166,154,0.06) 0%, transparent 60%);
  }
  .hero-card.active::before { opacity: 1; }
  .hero-card.active.hero-card-fv { border-color: rgba(41,98,255,0.3); }
  .hero-card.active.hero-card-health { border-color: rgba(38,166,154,0.3); }

  .hero-label {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .hero-value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .hero-value .unit {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .hero-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .hero-pill.green {
    background: var(--green-bg);
    color: var(--green);
  }
  .hero-pill.red {
    background: var(--red-bg);
    color: var(--red);
  }
  .hero-sub {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 4px;
  }

  /* Health score visual */
  .health-visual {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 2px;
  }
  .health-dots {
    display: flex;
    gap: 4px;
  }
  .health-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-tertiary);
    opacity: 0.3;
    transition: all 0.3s;
  }
  .health-dot.filled {
    background: var(--green);
    opacity: 1;
  }
  .health-dot.partial {
    background: var(--green);
    opacity: 0.5;
  }
  .health-rating {
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
  }

  /* ===== STICKY HEADER ===== */
  .sticky-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(26,26,46,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    opacity: 0;
    transform: translateY(-100%);
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
    margin: 0 -16px;
    width: calc(100% + 32px);
  }
  .sticky-header.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .sticky-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
  }
  .sticky-item .label {
    color: var(--text-secondary);
    font-weight: 500;
  }
  .sticky-sep {
    width: 1px;
    height: 16px;
    background: rgba(255,255,255,0.12);
  }

  /* ===== C2: TABS ===== */
  .tab-bar {
    display: flex;
    margin: 0 -16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .tab-item {
    flex: 1;
    text-align: center;
    padding: 12px 0 10px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-tertiary);
    cursor: pointer;
    position: relative;
    transition: color 0.25s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-item.active { color: var(--text-primary); }
  .tab-item::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 20%;
    right: 20%;
    height: 2px;
    background: var(--blue);
    border-radius: 1px;
    transform: scaleX(0);
    transition: transform 0.25s ease;
  }
  .tab-item.active::after { transform: scaleX(1); }

  .tab-content {
    display: none;
    animation: fadeIn 0.2s ease;
  }
  .tab-content.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* ===== C3: CARD CONTAINERS ===== */
  .section-container {
    border-radius: var(--radius);
    padding: 20px 16px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .section-container.fv-container {
    background: linear-gradient(135deg, rgba(41,98,255,0.05) 0%, var(--card-bg) 40%);
    border: 1px solid rgba(41,98,255,0.1);
  }
  .section-container.health-container {
    background: linear-gradient(135deg, rgba(38,166,154,0.05) 0%, var(--card-bg) 40%);
    border: 1px solid rgba(38,166,154,0.1);
  }
  .section-container-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-container-title .icon-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .section-container-title .icon-dot.blue { background: var(--blue); }
  .section-container-title .icon-dot.green { background: var(--green); }

  /* ===== C4: SECTION HEADERS ===== */
  .section-header-c4 {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-top: 4px;
  }
  .section-bar-c4 {
    width: 3px;
    height: 20px;
    border-radius: 2px;
  }
  .section-bar-c4.blue { background: var(--blue); }
  .section-bar-c4.green { background: var(--green); }
  .section-header-c4 .title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }
  .section-divider-c4 {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* ===== FV CONTENT ===== */
  .summary-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }
  .summary-text .green { color: var(--green); font-weight: 600; }
  .summary-text .bold { color: var(--text-primary); font-weight: 600; }

  /* Consensus bar */
  .consensus-bar-wrap {
    margin-bottom: 20px;
  }
  .consensus-bar-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .consensus-bar {
    height: 32px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    display: flex;
    position: relative;
  }
  .consensus-seg {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
    white-space: nowrap;
    overflow: hidden;
    min-width: 0;
  }
  .consensus-seg.undervalued {
    background: rgba(38,166,154,0.25);
    color: var(--green);
  }
  .consensus-seg.fair {
    background: rgba(255,171,0,0.25);
    color: var(--yellow);
  }
  .consensus-seg.overvalued {
    background: rgba(239,83,80,0.25);
    color: var(--red);
  }

  /* Model chips */
  .chips-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }
  .model-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .model-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 11px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.25s ease;
    -webkit-tap-highlight-color: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.04);
    user-select: none;
  }
  .model-chip .chip-name {
    font-weight: 500;
    color: var(--text-primary);
    transition: opacity 0.25s;
  }
  .model-chip .chip-value {
    font-weight: 700;
    color: var(--green);
    font-size: 11px;
    transition: opacity 0.25s;
  }
  .model-chip.inactive {
    border-style: dashed;
    border-color: rgba(255,255,255,0.08);
    background: transparent;
    opacity: 0.4;
  }
  .model-chip:active {
    transform: scale(0.96);
  }

  .calc-note {
    font-size: 11px;
    color: var(--text-tertiary);
    line-height: 1.5;
    margin-top: 4px;
  }

  /* ===== HEALTH CONTENT ===== */
  .health-bars {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .health-row {
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    border-radius: var(--radius-sm);
    transition: background 0.2s;
  }
  .health-row:active { background: rgba(255,255,255,0.03); }
  .health-row-main {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 4px;
  }
  .health-row-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    width: 110px;
    flex-shrink: 0;
  }
  .health-bar-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .health-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .health-bar-fill.bar-green { background: var(--green); }
  .health-bar-fill.bar-yellow { background: var(--yellow); }
  .health-bar-fill.bar-red { background: var(--red); }
  .health-row-score {
    font-size: 13px;
    font-weight: 700;
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }
  .health-row-score.score-green { color: var(--green); }
  .health-row-score.score-yellow { color: var(--yellow); }
  .health-row-score.score-red { color: var(--red); }

  .health-row-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
    padding: 0 4px;
  }
  .health-row-detail.expanded {
    max-height: 80px;
    padding: 0 4px 10px;
  }
  .health-row-detail p {
    font-size: 12px;
    color: var(--text-tertiary);
    line-height: 1.5;
    padding-left: 122px;
  }

  /* Expand chevron */
  .health-row-chevron {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease;
  }
  .health-row-chevron svg {
    width: 12px;
    height: 12px;
    fill: var(--text-tertiary);
  }
  .health-row.expanded .health-row-chevron {
    transform: rotate(180deg);
  }

  /* Number animation helper */
  .num-animate {
    transition: opacity 0.15s ease;
  }
  .num-animate.changing {
    opacity: 0.3;
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>Fair Value Tab Sections</h1>
  <p>Exploring visual separation of FV and Health content below the hero</p>
</div>

<div class="concept-switcher">
  <button class="concept-btn active" onclick="switchConcept('c2')">
    <span class="letter">C2</span>
    <span class="subtitle">Tabbed Content</span>
  </button>
  <button class="concept-btn" onclick="switchConcept('c3')">
    <span class="letter">C3</span>
    <span class="subtitle">Card Grouping</span>
  </button>
  <button class="concept-btn" onclick="switchConcept('c4')">
    <span class="letter">C4</span>
    <span class="subtitle">Section Headers</span>
  </button>
</div>

<div class="concept-label" id="conceptLabel">C2: Tabbed Content</div>

<div class="phone-frame">
  <!-- Status bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 16 16"><path d="M1 11.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-3zm3.5-2a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v5a.5.5 0 0 1-.5.5H5a.5.5 0 0 1-.5-.5v-5zm3.5-2a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-7zm3.5-2a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-9z"/></svg>
      <svg viewBox="0 0 16 16"><path d="M8 1.918l-.797.161A4.002 4.002 0 0 0 4 6c0 .628-.134 2.197-.459 3.742-.16.767-.376 1.566-.663 2.258h10.244c-.287-.692-.502-1.49-.663-2.258C12.134 8.197 12 6.628 12 6a4.002 4.002 0 0 0-3.203-3.92L8 1.917zM14.22 12c.223.447.481.801.78 1H1c.299-.199.557-.553.78-1C2.68 10.2 3 6.88 3 6c0-2.42 1.72-4.44 4.005-4.901a1 1 0 1 1 1.99 0A5.002 5.002 0 0 1 13 6c0 .88.32 4.2 1.22 6z"/></svg>
      <svg viewBox="0 0 16 16"><path d="M2 1a1 1 0 0 0-1 1v11a1 1 0 0 0 1 1h1.5a.5.5 0 0 0 0-1H2V2h12v11h-1.5a.5.5 0 0 0 0 1H14a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H2z"/><path d="M9.5 3a.5.5 0 0 0 0 1h2a.5.5 0 0 0 0-1h-2z"/></svg>
    </div>
  </div>

  <!-- Nav bar -->
  <div class="nav-bar">
    <div class="nav-back">
      <svg viewBox="0 0 20 20"><path d="M12.707 15.707a1 1 0 0 1-1.414 0l-5-5a1 1 0 0 1 0-1.414l5-5a1 1 0 0 1 1.414 1.414L8.414 10l4.293 4.293a1 1 0 0 1 0 1.414z"/></svg>
    </div>
    <div class="nav-title">
      <div class="ticker">AAPL</div>
      <div class="name">Apple Inc. - $198.50</div>
    </div>
  </div>

  <!-- Screen content (scrollable) -->
  <div class="screen-content" id="screenContent">
    <div class="content-pad" id="contentArea"></div>
  </div>

  <!-- Home indicator -->
  <div class="home-indicator">
    <div class="home-indicator-bar"></div>
  </div>
</div>

<script>
// ===== DATA =====
const MODELS_DATA = [
  { name: 'DCF Growth Exit', value: 245 },
  { name: 'DCF EBITDA Exit', value: 238 },
  { name: 'DCF Revenue Exit', value: 220 },
  { name: 'Dividend Discount', value: 215 },
  { name: 'P/E Multiple', value: 242 },
  { name: 'EV/EBITDA', value: 230 },
  { name: 'Price/Sales', value: 248 },
  { name: 'Price/Book', value: 210 },
  { name: 'PEG Ratio', value: 235 },
  { name: 'FCF Yield', value: 240 },
  { name: 'Earnings Power', value: 225 },
  { name: 'Graham Number', value: 205 },
  { name: 'Sum of Parts', value: 252 },
  { name: 'Residual Income', value: 228 }
];

const HEALTH_MODELS = [
  { name: 'Relative Value', score: 3.8, desc: 'Evaluates valuation metrics relative to sector peers, including P/E, P/B, and PEG ratios.' },
  { name: 'Price Momentum', score: 4.5, desc: 'Analyzes recent price trends, RSI, and moving average crossovers to assess directional strength.' },
  { name: 'Cash Flow Health', score: 4.6, desc: 'Measures free cash flow generation, operating cash flow margins, and cash conversion efficiency.' },
  { name: 'Profitability', score: 4.9, desc: 'Assesses return on equity, net margins, and operating efficiency compared to industry benchmarks.' },
  { name: 'Growth', score: 3.2, desc: 'Examines revenue growth rate, earnings growth trajectory, and forward growth estimates.' }
];

const CURRENT_PRICE = 198.50;
const MARKET_MID = 227.50;
const ANALYST_AVG = 232;

// Per-concept state
const state = {
  c2: { models: MODELS_DATA.map(() => true), activeTab: 'fv', expandedHealth: {} },
  c3: { models: MODELS_DATA.map(() => true), expandedHealth: {} },
  c4: { models: MODELS_DATA.map(() => true), expandedHealth: {} }
};

let activeConcept = 'c2';

// ===== CALCULATIONS =====
function calcFV(concept) {
  const s = state[concept];
  const activeModels = MODELS_DATA.filter((_, i) => s.models[i]);
  if (activeModels.length === 0) {
    return { fv: MARKET_MID, upside: ((MARKET_MID - CURRENT_PRICE) / CURRENT_PRICE * 100), activeCount: 0, totalCount: MODELS_DATA.length };
  }
  const modelAvg = activeModels.reduce((sum, m) => sum + m.value, 0) / activeModels.length;
  const fv = (modelAvg * activeModels.length + MARKET_MID + ANALYST_AVG) / (activeModels.length + 2);
  const upside = (fv - CURRENT_PRICE) / CURRENT_PRICE * 100;
  return { fv, upside, activeCount: activeModels.length, totalCount: MODELS_DATA.length };
}

function classifyModel(modelValue, modelName) {
  if (modelName === 'Graham Number') return 'fair';
  if (modelName === 'Price/Book') return 'fair';
  const threshold = CURRENT_PRICE * 1.05;
  const fairLow = CURRENT_PRICE * 0.95;
  if (modelValue > threshold) return 'undervalued';
  if (modelValue >= fairLow) return 'fair';
  return 'overvalued';
}

function calcConsensus(concept) {
  const s = state[concept];
  let under = 0, fair = 0, over = 0;
  MODELS_DATA.forEach((m, i) => {
    if (!s.models[i]) return;
    const c = classifyModel(m.value, m.name);
    if (c === 'undervalued') under++;
    else if (c === 'fair') fair++;
    else over++;
  });
  return { under, fair, over };
}

function healthBarColor(score) {
  if (score >= 4) return 'green';
  if (score >= 3) return 'yellow';
  return 'red';
}

// ===== RENDER HELPERS =====
function renderHero(concept) {
  const d = calcFV(concept);
  const isPositive = d.upside >= 0;
  const isC2 = concept === 'c2';
  const fvActive = isC2 && state.c2.activeTab === 'fv';
  const healthActive = isC2 && state.c2.activeTab === 'health';

  return `
    <div class="hero-row">
      <div class="hero-card hero-card-fv ${fvActive ? 'active' : ''}" onclick="heroTap('${concept}', 'fv')">
        <div class="hero-label">Fair Value</div>
        <div class="hero-value num-animate" id="heroFV-${concept}">$${d.fv.toFixed(2)}</div>
        <div class="hero-pill ${isPositive ? 'green' : 'red'}">
          <span id="heroPill-${concept}">${isPositive ? '+' : ''}${d.upside.toFixed(1)}% ${isPositive ? 'Upside' : 'Downside'}</span>
        </div>
        <div class="hero-sub">High Certainty</div>
      </div>
      <div class="hero-card hero-card-health ${healthActive ? 'active' : ''}" onclick="heroTap('${concept}', 'health')">
        <div class="hero-label">Health Score</div>
        <div class="hero-value">4.2<span class="unit">/5</span></div>
        <div class="health-visual">
          <div class="health-dots">
            <div class="health-dot filled"></div>
            <div class="health-dot filled"></div>
            <div class="health-dot filled"></div>
            <div class="health-dot filled"></div>
            <div class="health-dot partial"></div>
          </div>
        </div>
        <div class="hero-sub" style="color: var(--green); font-weight: 600; margin-top: 6px;">Strong</div>
      </div>
    </div>
  `;
}

function renderStickyHeader(concept) {
  const d = calcFV(concept);
  const isPositive = d.upside >= 0;
  return `
    <div class="sticky-header" id="sticky-${concept}">
      <div class="sticky-item">
        <span class="label">FV:</span>
        <span style="color: var(--text-primary); font-weight: 700;" id="stickyFV-${concept}">$${d.fv.toFixed(2)}</span>
        <span style="color: var(${isPositive ? '--green' : '--red'}); font-size: 12px;" id="stickyUpside-${concept}">${isPositive ? '+' : ''}${d.upside.toFixed(1)}%</span>
      </div>
      <div class="sticky-sep"></div>
      <div class="sticky-item">
        <span class="label">Health:</span>
        <span style="color: var(--green); font-weight: 700;">4.2/5</span>
      </div>
    </div>
  `;
}

function renderSummary(concept) {
  const d = calcFV(concept);
  const c = calcConsensus(concept);
  const isPositive = d.upside >= 0;
  const totalActive = c.under + c.fair + c.over;
  const totalAll = d.totalCount;
  const direction = isPositive ? 'undervalued' : 'overvalued';
  const healthWord = 'strong';
  return `
    <div class="summary-text" id="summary-${concept}">
      AAPL is <span class="green">${direction}</span> by ${Math.abs(d.upside).toFixed(1)}% with <span class="green">${healthWord}</span> financial health. <span class="bold">${c.under} of ${totalActive}</span> models agree.
    </div>
  `;
}

function renderConsensusBar(concept) {
  const c = calcConsensus(concept);
  const total = c.under + c.fair + c.over;
  if (total === 0) {
    return `<div class="consensus-bar-wrap"><div class="consensus-bar-label">Model Consensus</div><div class="consensus-bar"><div class="consensus-seg fair" style="width:100%">No active models</div></div></div>`;
  }
  const underPct = (c.under / total * 100);
  const fairPct = (c.fair / total * 100);
  const overPct = (c.over / total * 100);
  let html = `<div class="consensus-bar-wrap"><div class="consensus-bar-label">Model Consensus</div><div class="consensus-bar" id="consensusBar-${concept}">`;
  if (c.under > 0) html += `<div class="consensus-seg undervalued" style="width:${underPct}%">${c.under} Undervalued</div>`;
  if (c.fair > 0) html += `<div class="consensus-seg fair" style="width:${fairPct}%">${c.fair} Fair</div>`;
  if (c.over > 0) html += `<div class="consensus-seg overvalued" style="width:${overPct}%">${c.over} Overvalued</div>`;
  html += `</div></div>`;
  return html;
}

function renderModelChips(concept) {
  const s = state[concept];
  let html = `<div class="chips-label">InvestingPro Models</div><div class="model-chips" id="chips-${concept}">`;
  MODELS_DATA.forEach((m, i) => {
    const active = s.models[i];
    html += `<div class="model-chip ${active ? '' : 'inactive'}" onclick="toggleModel('${concept}', ${i})">
      <span class="chip-name">${m.name}</span>
      <span class="chip-value">$${m.value}</span>
    </div>`;
  });
  html += `</div>`;
  const d = calcFV(concept);
  const activeCount = MODELS_DATA.filter((_, i) => s.models[i]).length;
  html += `<div class="calc-note" id="calcNote-${concept}">Based on ${activeCount} model${activeCount !== 1 ? 's' : ''}, Market Range, and Analyst Target</div>`;
  return html;
}

function renderFVContent(concept) {
  return renderSummary(concept) + renderConsensusBar(concept) + renderModelChips(concept);
}

function renderHealthContent(concept) {
  const s = state[concept];
  let html = `<div class="health-bars" id="healthBars-${concept}">`;
  HEALTH_MODELS.forEach((m, i) => {
    const color = healthBarColor(m.score);
    const widthPct = (m.score / 5 * 100);
    const expanded = s.expandedHealth[i] || false;
    html += `
      <div class="health-row ${expanded ? 'expanded' : ''}" onclick="toggleHealthRow('${concept}', ${i})">
        <div class="health-row-main">
          <div class="health-row-name">${m.name}</div>
          <div class="health-bar-track">
            <div class="health-bar-fill bar-${color}" style="width:${widthPct}%"></div>
          </div>
          <div class="health-row-score score-${color}">${m.score}</div>
          <div class="health-row-chevron">
            <svg viewBox="0 0 12 12"><path d="M2.5 4.5L6 8l3.5-3.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        <div class="health-row-detail ${expanded ? 'expanded' : ''}">
          <p>${m.desc}</p>
        </div>
      </div>
    `;
  });
  html += `</div>`;
  return html;
}

// ===== BUILD CONCEPTS =====
function buildC2() {
  const s = state.c2;
  let html = renderHero('c2');
  html += renderStickyHeader('c2');
  html += `
    <div class="tab-bar" id="tabBar-c2">
      <div class="tab-item ${s.activeTab === 'fv' ? 'active' : ''}" onclick="switchTab('c2', 'fv')">Fair Value</div>
      <div class="tab-item ${s.activeTab === 'health' ? 'active' : ''}" onclick="switchTab('c2', 'health')">Health</div>
    </div>
    <div class="tab-content ${s.activeTab === 'fv' ? 'active' : ''}" id="tabFV-c2">
      ${renderFVContent('c2')}
    </div>
    <div class="tab-content ${s.activeTab === 'health' ? 'active' : ''}" id="tabHealth-c2">
      ${renderHealthContent('c2')}
    </div>
  `;
  return html;
}

function buildC3() {
  let html = renderHero('c3');
  html += renderStickyHeader('c3');
  html += `<div style="height: 16px;"></div>`;
  html += `
    <div class="section-container fv-container">
      <div class="section-container-title"><div class="icon-dot blue"></div> Fair Value Details</div>
      ${renderFVContent('c3')}
    </div>
    <div class="section-container health-container">
      <div class="section-container-title"><div class="icon-dot green"></div> Health Breakdown</div>
      ${renderHealthContent('c3')}
    </div>
  `;
  return html;
}

function buildC4() {
  let html = renderHero('c4');
  html += renderStickyHeader('c4');
  html += `<div style="height: 20px;"></div>`;
  html += `
    <div class="section-header-c4">
      <div class="section-bar-c4 blue"></div>
      <div class="title">Fair Value</div>
    </div>
    ${renderFVContent('c4')}
    <div class="section-divider-c4"></div>
    <div class="section-header-c4">
      <div class="section-bar-c4 green"></div>
      <div class="title">Financial Health</div>
    </div>
    ${renderHealthContent('c4')}
  `;
  return html;
}

// ===== CONCEPT SWITCHING =====
const labels = {
  c2: 'C2: Tabbed Content',
  c3: 'C3: Card Grouping',
  c4: 'C4: Section Headers'
};

function switchConcept(concept) {
  activeConcept = concept;
  document.querySelectorAll('.concept-btn').forEach((btn, i) => {
    const c = ['c2', 'c3', 'c4'][i];
    btn.classList.toggle('active', c === concept);
  });
  document.getElementById('conceptLabel').textContent = labels[concept];
  renderScreen();
  document.getElementById('screenContent').scrollTop = 0;
}

function renderScreen() {
  const content = document.getElementById('contentArea');
  if (activeConcept === 'c2') content.innerHTML = buildC2();
  else if (activeConcept === 'c3') content.innerHTML = buildC3();
  else content.innerHTML = buildC4();
  setupStickyObserver();
}

// ===== INTERACTIONS =====
function switchTab(concept, tab) {
  if (concept !== 'c2') return;
  state.c2.activeTab = tab;
  renderScreen();
}

function heroTap(concept, which) {
  if (concept === 'c2') {
    state.c2.activeTab = which === 'fv' ? 'fv' : 'health';
    renderScreen();
  }
}

function toggleModel(concept, idx) {
  state[concept].models[idx] = !state[concept].models[idx];
  updateCalculations(concept);
}

function toggleHealthRow(concept, idx) {
  state[concept].expandedHealth[idx] = !state[concept].expandedHealth[idx];
  const bars = document.getElementById('healthBars-' + concept);
  if (!bars) return;
  const rows = bars.querySelectorAll('.health-row');
  const row = rows[idx];
  if (!row) return;
  row.classList.toggle('expanded');
  row.querySelector('.health-row-detail').classList.toggle('expanded');
}

function updateCalculations(concept) {
  const d = calcFV(concept);
  const c = calcConsensus(concept);
  const isPositive = d.upside >= 0;
  const totalActive = c.under + c.fair + c.over;
  const activeCount = MODELS_DATA.filter((_, i) => state[concept].models[i]).length;

  // Animate hero FV
  const heroFV = document.getElementById('heroFV-' + concept);
  if (heroFV) {
    heroFV.classList.add('changing');
    setTimeout(() => {
      heroFV.textContent = '$' + d.fv.toFixed(2);
      heroFV.classList.remove('changing');
    }, 150);
  }

  // Animate hero pill
  const heroPill = document.getElementById('heroPill-' + concept);
  if (heroPill) {
    const parent = heroPill.closest('.hero-pill');
    parent.className = 'hero-pill ' + (isPositive ? 'green' : 'red');
    heroPill.textContent = (isPositive ? '+' : '') + d.upside.toFixed(1) + '% ' + (isPositive ? 'Upside' : 'Downside');
  }

  // Update summary
  const summary = document.getElementById('summary-' + concept);
  if (summary) {
    const direction = isPositive ? 'undervalued' : 'overvalued';
    summary.innerHTML = `AAPL is <span class="green">${direction}</span> by ${Math.abs(d.upside).toFixed(1)}% with <span class="green">strong</span> financial health. <span class="bold">${c.under} of ${totalActive}</span> models agree.`;
  }

  // Update consensus bar
  const bar = document.getElementById('consensusBar-' + concept);
  if (bar) {
    let html = '';
    if (totalActive === 0) {
      html = '<div class="consensus-seg fair" style="width:100%">No active models</div>';
    } else {
      const underPct = (c.under / totalActive * 100);
      const fairPct = (c.fair / totalActive * 100);
      const overPct = (c.over / totalActive * 100);
      if (c.under > 0) html += `<div class="consensus-seg undervalued" style="width:${underPct}%">${c.under} Undervalued</div>`;
      if (c.fair > 0) html += `<div class="consensus-seg fair" style="width:${fairPct}%">${c.fair} Fair</div>`;
      if (c.over > 0) html += `<div class="consensus-seg overvalued" style="width:${overPct}%">${c.over} Overvalued</div>`;
    }
    bar.innerHTML = html;
  }

  // Update chips
  const chips = document.getElementById('chips-' + concept);
  if (chips) {
    const chipEls = chips.querySelectorAll('.model-chip');
    chipEls.forEach((el, i) => {
      el.classList.toggle('inactive', !state[concept].models[i]);
    });
  }

  // Update calc note
  const note = document.getElementById('calcNote-' + concept);
  if (note) {
    note.textContent = `Based on ${activeCount} model${activeCount !== 1 ? 's' : ''}, Market Range, and Analyst Target`;
  }

  // Update sticky
  const stickyFV = document.getElementById('stickyFV-' + concept);
  if (stickyFV) stickyFV.textContent = '$' + d.fv.toFixed(2);
  const stickyUpside = document.getElementById('stickyUpside-' + concept);
  if (stickyUpside) {
    stickyUpside.style.color = isPositive ? 'var(--green)' : 'var(--red)';
    stickyUpside.textContent = (isPositive ? '+' : '') + d.upside.toFixed(1) + '%';
  }
}

// ===== STICKY HEADER LOGIC =====
function setupStickyObserver() {
  const scrollContainer = document.getElementById('screenContent');
  const sticky = document.getElementById('sticky-' + activeConcept);
  if (!sticky) return;

  const heroRow = document.querySelector('.hero-row');
  if (!heroRow) return;

  scrollContainer.addEventListener('scroll', function() {
    const heroBottom = heroRow.getBoundingClientRect().bottom;
    const containerTop = scrollContainer.getBoundingClientRect().top;
    if (heroBottom < containerTop) {
      sticky.classList.add('visible');
    } else {
      sticky.classList.remove('visible');
    }
  });
}

// ===== INIT =====
renderScreen();
</script>
</body>
</html>
